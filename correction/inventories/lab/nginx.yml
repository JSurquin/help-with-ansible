---
# Use with docker-compose-lab.yml (web03 + app01 as 2 Nginx nodes).
all:
  vars:
    ansible_connection: docker
  children:
    nginx_servers:
      hosts:
        nginx1:
          ansible_host: ansible-lab-web03
          server_id: 1
        nginx2:
          ansible_host: ansible-lab-app01
          server_id: 2
