---
# Use with docker-compose-lab.yml at repository root (docker connection from the host).
all:
  vars:
    ansible_connection: docker
  children:
    apache_servers:
      hosts:
        apache1:
          ansible_host: ansible-lab-web01
          server_id: 1
        apache2:
          ansible_host: ansible-lab-web02
          server_id: 2
