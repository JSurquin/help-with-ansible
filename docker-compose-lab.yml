# Docker Compose Lab - Test infrastructure for Ansible
# This file creates 10 Ubuntu containers that simulate servers
# Ansible can manage them like real servers

services:
  # Web servers (3 instances)
  web-server-1:
    image: ubuntu:22.04
    hostname: web01
    container_name: ansible-lab-web01
    command: |
      bash -c "apt-get update && 
               apt-get install -y openssh-server python3 sudo &&
               mkdir -p /var/run/sshd &&
               echo 'root:ansible' | chpasswd &&
               sed -i 's/#PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config &&
               /usr/sbin/sshd -D"
    networks:
      - ansible-lab
    expose:
      - "22"

