---
# Main tasks for the app role
# This role deploys a simple Python application for demonstration

- name: Install Python3 and pip
  apt:
    name:
      - python3
      - python3-pip
    state: present
    update_cache: yes
  tags: ['packages']

- name: Create the application user
  user:
    name: "{{ app_user }}"
    system: yes
    shell: /bin/bash
    home: "{{ app_dir }}"
    createhome: no
  tags: ['config']

- name: Create the application directory
  file:
    path: "{{ app_dir }}"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: '0755'
  tags: ['config']

- name: Deploy the application (simple HTTP server)
  template:
    src: app.py.j2
    dest: "{{ app_dir }}/app.py"
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: '0755'
  notify: Restart application
  tags: ['deploy']

- name: Create the systemd service file
  # NOTE: In Docker without systemd, we start the app directly
  # In production, use a real systemd service file
  template:
    src: app-start.sh.j2
    dest: "{{ app_dir }}/start.sh"
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: '0755'
  tags: ['config']

- name: Stop the application if it is already running
  shell: pkill -f "python3 {{ app_dir }}/app.py" || true
  failed_when: false
  tags: ['service']

- name: Start the application in the background
  # NOTE: For Docker without systemd, we use nohup
  # In production with systemd, use: service: name=myapp state=started
  shell: nohup python3 {{ app_dir }}/app.py > {{ app_dir }}/app.log 2>&1 &
  args:
    chdir: "{{ app_dir }}"
    executable: /bin/bash
  async: 5
  poll: 0
  tags: ['service']

- name: Wait for the application to start
  wait_for:
    port: "{{ app_port }}"
    delay: 2
    timeout: 30
  tags: ['service']
