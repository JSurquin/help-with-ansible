# Section: Ansible default settings
[defaults]
# Ansible configuration for the project

# Default staging inventory path
inventory = inventories/staging

# Role search paths (local then global)
roles_path = ./roles:~/.ansible/roles

# Disable SSH host key checking (lab environment only)
# Avoid this in real production for security reasons
host_key_checking = False

# Callback plugins for performance metrics
# Shows execution time for each task
callback_whitelist = timer, profile_tasks

# Standard output display plugin
stdout_callback = default
# Result format: YAML (readable)
result_format = yaml

# Number of parallel processes for concurrent execution
forks = 10

# Connection timeout in seconds
timeout = 30

# Enable retry file creation on failure
retry_files_enabled = True
# Directory where retry files are saved
retry_files_save_path = ~/.ansible-retry

# Ansible log file path
log_path = ./ansible.log

# Section: privilege escalation
[privilege_escalation]
# Enable privilege escalation by default
become = True
# Escalation method: sudo
become_method = sudo
# Target user for escalation: root
become_user = root
# Do not prompt for the sudo password
become_ask_pass = False

# Section: SSH connection settings
[ssh_connection]
# Enable SSH pipelining (fewer connections)
pipelining = True
# SSH arguments for multiplexing (ControlMaster reuses connections)
ssh_args = -o ControlMaster=auto -o ControlPersist=60s
