# STAGING inventory
all: # Root group containing all servers
  vars: # Variables common to all staging servers
    ansible_connection: docker # Connection type: Docker (lab environment)
    ansible_user: root # Connection user: root
    #ansible_python_interpreter: /usr/bin/python3 # Python interpreter on target hosts
    env: staging # Environment variable: staging

  children: # Subgroups organized by environment
    staging: # Staging group
      children: # Functional subgroups within staging
        webservers: # Web server group
          hosts: # Web servers
            web01: # First web server
              ansible_host: ansible-lab-web01 # Docker container name
        
        appservers: # Application server group
          hosts: # Application servers
            app01: # First application server
              ansible_host: ansible-lab-app01 # Docker container name
        
        monitoring: # Monitoring server group
          hosts: # Monitoring servers
            monitor01: # First monitoring server
              ansible_host: ansible-lab-monitor01 # Docker container name
