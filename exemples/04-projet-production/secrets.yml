--- # Start of YAML document
# Secrets file (encrypt with ansible-vault)
# To encrypt: ansible-vault encrypt secrets.yml {# Command to encrypt this file #}
# To edit: ansible-vault edit secrets.yml {# Command to edit the encrypted file #}

# Database passwords
vault_db_password_staging: "staging_secret_password_123" # Staging DB password (to encrypt)
vault_db_password_production: "prod_very_secret_password_456" # Production DB password (to encrypt)

# API keys
vault_api_key: "sk-1234567890abcdef" # API key for external services (to encrypt)
vault_monitoring_token: "mon-token-secret" # Token for monitoring access (to encrypt)

# SSL certificates (in production, use real certificates)
vault_ssl_cert_password: "cert_password_789" # SSL certificate password (to encrypt)

# Other secrets
vault_jwt_secret: "super_secret_jwt_key" # Secret key for JWT signing (to encrypt)
vault_encryption_key: "encryption_key_for_data" # Data encryption key (to encrypt)
