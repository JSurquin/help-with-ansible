# Ansible inventory for the Docker lab
# This file defines all test "servers" (Docker containers)

all:
  vars:
    ansible_connection: docker
    ansible_user: root
    ansible_password: ansible
    ansible_python_interpreter: /usr/bin/python3

  children:
    # Web server group
    webservers:
      hosts:
        web01:
          ansible_host: ansible-lab-web01
        web02:
          ansible_host: ansible-lab-web02
        web03:
          ansible_host: ansible-lab-web03

    # Database server group
    databases:
      hosts:
        db01:
          ansible_host: ansible-lab-db01
        db02:
          ansible_host: ansible-lab-db02

    # Application server group
    appservers:
      hosts:
        app01:
          ansible_host: ansible-lab-app01
        app02:
          ansible_host: ansible-lab-app02
        app03:
          ansible_host: ansible-lab-app03

    # Monitoring server group
    monitoring:
      hosts:
        monitor01:
          ansible_host: ansible-lab-monitor01
        monitor02:
          ansible_host: ansible-lab-monitor02

    # Logical groups for exercises
    production:
      children:
        webservers:
        databases:
        appservers:

    infrastructure:
      children:
        monitoring:
